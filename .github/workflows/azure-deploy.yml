name: Deploy to Azure App Service

on:
  push:
    branches:
      - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client & push schema to Azure PostgreSQL
        run: |
          npx prisma generate
          npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed default admin
        run: npx tsx prisma/seed-admin.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed pricing plans
        run: npx tsx prisma/seed-plans.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # NEXT_PUBLIC_* vars are baked into the JS bundle at build time — must be real values
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
          # Server-side vars (read from Azure App Service env at runtime,
          # but needed here so Next.js build does not fail)
          JWT_SECRET: placeholder
          CLOUDINARY_CLOUD_NAME: placeholder
          CLOUDINARY_API_KEY: placeholder
          CLOUDINARY_API_SECRET: placeholder
          RAZORPAY_KEY_ID: placeholder
          RAZORPAY_KEY_SECRET: placeholder
          SMTP_HOST: placeholder
          SMTP_PORT: 587
          SMTP_USER: placeholder
          SMTP_PASS: placeholder
          SMTP_FROM: placeholder
          RECAPTCHA_SECRET_KEY: placeholder

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: buynoe-ecomm
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: .
